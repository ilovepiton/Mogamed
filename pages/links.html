<!DOCTYPE html>

  <title>Links — Mogamed Office</title>

<body>
  <header class="site-header">
    <a class="logo" href="../index.html">Mogamed Office</a>

    <nav class="main-menu">

      <a href="catalan.html">Catalan</a>

  <main class="page">

      <p class="eyebrow">Quick Links</p>
      <h1>Your useful websites</h1>
      <p>Fast access to your most important apps and tools.</p>

    <section class="app-section">
      <h2>AI Tools</h2>

      <div class="app-circle-grid">
        <a class="circle-app" href="https://chat.openai.com" target="_blank">

        <a class="circle-app" href="https://claude.ai" target="_blank">

        <a class="circle-app" href="https://github.com" target="_blank">
          <div class="circle-app-icon github-icon">GH</div>

        </a>

        <a class="circle-app" href="https://youtube.com" target="_blank">

        </a>

          <div class="circle-app-icon wiki-icon">W</div>
          <span>Wikipedia</span>
        </a>
      </div>
