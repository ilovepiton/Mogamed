<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Links — Mogamed Office</title>

  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
  <header class="site-header">
    <a class="logo" href="../index.html">Mogamed Office</a>

    <nav class="main-menu">
      <a href="../index.html">Home</a>
      <a href="news.html">AI News</a>
      <a href="catalan.html">Catalan</a>
      <a href="links.html">Links</a>
    </nav>
  </header>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">Quick Links</p>
      <h1>Your useful websites</h1>
      <p>Fast access to your most important apps, school tools and AI websites.</p>
    </section>

    <section class="app-section">
      <h2>Main Apps</h2>

      <div class="app-circle-grid">
        <a class="circle-app" href="https://chat.openai.com" target="_blank">
          <div class="circle-app-icon logo-icon chatgpt-icon">
            <img src="https://cdn.simpleicons.org/openai/ffffff" alt="ChatGPT">
          </div>
          <span>ChatGPT</span>
        </a>

        <a class="circle-app" href="https://github.com" target="_blank">
          <div class="circle-app-icon logo-icon github-icon">
            <img src="https://cdn.simpleicons.org/github/ffffff" alt="GitHub">
          </div>
          <span>GitHub</span>
        </a>

        <a class="circle-app" href="https://youtube.com" target="_blank">
          <div class="circle-app-icon logo-icon youtube-icon">
            <img src="https://cdn.simpleicons.org/youtube/ffffff" alt="YouTube">
          </div>
          <span>YouTube</span>
        </a>

        <a class="circle-app" href="https://translate.google.com" target="_blank">
          <div class="circle-app-icon logo-icon translate-icon">
            <img src="https://cdn.simpleicons.org/googletranslate/ffffff" alt="Google Translate">
          </div>
          <span>Translate</span>
        </a>

        <a class="circle-app" href="https://discord.com/" target="_blank">
          <div class="circle-app-icon logo-icon discord-icon">
            <img src="https://cdn.simpleicons.org/discord/ffffff" alt="Discord">
          </div>
          <span>Discord</span>
        </a>

        <a class="circle-app" href="https://proton.me/" target="_blank">
          <div class="circle-app-icon logo-icon proton-icon">
            <img src="https://cdn.simpleicons.org/protonmail/ffffff" alt="Proton">
          </div>
          <span>Proton</span>
        </a>

        <a class="circle-app" href="https://student.kingsinterhigh.co.uk/" target="_blank">
          <div class="circle-app-icon kings-icon">KI</div>
          <span>Kings InterHigh</span>
        </a>

        <a class="circle-app" href="https://magicstudio.com/ru/magiceraser/" target="_blank">
          <div class="circle-app-icon magic-icon">ME</div>
          <span>Magic Eraser</span>
        </a>
      </div>
    </section>
  </main>

  <script src="../scripts/app.js"></script>

</html>
