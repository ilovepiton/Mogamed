<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login — Mogamed Office</title>

  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
  <header class="site-header">
    <div class="logo">Mogamed Office</div>

    <nav class="main-menu">
      <a href="../index.html">Home</a>
      <a href="news.html">AI News</a>
      <a href="catalan.html">Catalan</a>
      <a href="links.html">Links</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="page">
    <section class="auth-box">
      <p class="eyebrow">Account</p>
      <h1>Login</h1>
      <p class="auth-text">Later this page will let you enter your personal office account.</p>

      <form class="auth-form">
        <label>
          Email
          <input type="email" placeholder="you@example.com">
        </label>

        <label>
          Password
          <input type="password" placeholder="Your password">
        </label>

        <button type="button">Login</button>
      </form>

      <p class="auth-small">
        No account yet?
        <a href="create-account.html">Create account</a>
      </p>
    </section>
  </main>

  <script src="../scripts/app.js"></script>
</body>
</html>
