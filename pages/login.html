<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login — Mogamed Office</title>

  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/auth.css">
</head>

<body class="login-page">
  <main class="login-screen">
    <section class="login-card">
      <p class="login-kicker">Mogamed Office</p>

      <h1>Login to Your Office</h1>
      <p class="login-subtitle">Enter your name and password to continue.</p>

      <form class="login-form" id="loginForm">
        <label>
          <span>Name</span>
          <input id="loginName" type="text" placeholder="Klimentiy">
        </label>

        <label>
          <span>Password</span>
          <input id="loginPassword" type="password" placeholder="Enter password">
        </label>

        <button type="submit">Enter Office</button>
      </form>

      <p class="auth-error" id="loginError"></p>
    </section>
  </main>

  <script src="../scripts/login.js"></script>
</body>
</html>
