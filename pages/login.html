<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login — Mogamed Office</title>

  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>
  <header class="site-header">
    <div class="logo">Mogamed Office</div>

    <nav class="main-menu">
      <a href="../index.html">Home</a>
      <a href="news.html">AI News</a>
      <a href="catalan.html">Catalan</a>
      <a href="links.html">Links</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="page">
    <section class="auth-box">
      <p class="eyebrow">Account</p>
      <h1>Login</h1>
      <p class="auth-text">Enter your name and password to open Mogamed Office.</p>

      <form class="auth-form" id="loginForm">
        <label>
          Name
          <input id="loginName" type="text" placeholder="Enter name">
        </label>

        <label>
          Password
          <input id="loginPassword" type="password" placeholder="Enter password">
        </label>

        <button type="submit">Enter Office</button>
      </form>

      <p class="auth-error" id="loginError"></p>
    </section>
  </main>

  <script src="../scripts/login.js"></script>
</body>
</html>
